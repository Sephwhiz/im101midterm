<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM101 Midterm Quiz - SQL Mastery</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-5 fw-bold text-white">IM101 Midterm Quiz</h1>
            <p class="lead text-white-50">50 Questions on Refining, Aggregating, and Reasoning with SQL</p>
            <div class="progress-container mt-3">
                <div class="progress">
                    <div class="progress-bar bg-warning" id="progressBar" role="progressbar" style="width: 0%">0/50</div>
                </div>
            </div>
        </header>

        <form id="quizForm">
            <div id="quizContainer" class="row g-4">
                <!-- Questions will be loaded here by JavaScript -->
            </div>

            <div class="text-center mt-5">
                <button type="button" class="btn btn-light btn-lg px-5 shadow" onclick="submitQuiz()">
                    📝 Submit Answers
                </button>
            </div>
        </form>

        <!-- Result Section (Hidden initially) -->
        <div id="resultSection" class="mt-5 d-none">
            <div class="card text-center shadow-lg border-0">
                <div class="card-header bg-gradient-purple text-white">
                    <h2 class="mb-0">🎯 Quiz Results</h2>
                </div>
                <div class="card-body">
                    <h3 class="display-3 fw-bold text-purple" id="scoreDisplay">0 / 50</h3>
                    <p class="lead" id="scoreMessage">Keep practicing!</p>
                    <div class="row mt-4">
                        <div class="col-md-4">
                            <div class="stat-box bg-success bg-opacity-10">
                                <h4 class="text-success" id="correctCount">0</h4>
                                <p>Correct</p>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stat-box bg-danger bg-opacity-10">
                                <h4 class="text-danger" id="wrongCount">0</h4>
                                <p>Wrong</p>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="stat-box bg-warning bg-opacity-10">
                                <h4 class="text-warning" id="percentage">0%</h4>
                                <p>Score</p>
                            </div>
                        </div>
                    </div>
                    <button class="btn btn-outline-purple mt-4 px-4" onclick="location.reload()">🔄 Retake Quiz</button>
                </div>
            </div>
        </div>

        <footer class="text-center mt-5 text-white-50">
            <p>IM101 - Advanced Database Systems | Midterm Assessment</p>
        </footer>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
