<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IM101 Midterm Quiz</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <header class="text-center mb-5">
            <h1 class="display-5 fw-bold text-primary">IM101 Midterm Mastery</h1>
            <p class="lead text-muted">50 Questions on Refining, Aggregating, and Reasoning with SQL</p>
        </header>

        <form id="quizForm">
            <div id="quizContainer" class="row g-4">
                <!-- Questions will be loaded here by JavaScript -->
            </div>

            <div class="text-center mt-5">
                <button type="button" class="btn btn-primary btn-lg px-5" onclick="submitQuiz()">Submit Answers</button>
            </div>
        </form>

        <!-- Result Section (Hidden initially) -->
        <div id="resultSection" class="mt-5 d-none">
            <div class="card text-center shadow">
                <div class="card-header bg-primary text-white">
                    <h2 class="mb-0">Quiz Results</h2>
                </div>
                <div class="card-body">
                    <h3 class="display-4 fw-bold" id="scoreDisplay">0 / 50</h3>
                    <p class="lead" id="scoreMessage">Keep practicing!</p>
                    <button class="btn btn-outline-primary mt-3" onclick="location.reload()">Retake Quiz</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
